services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: rca-copilot-backend
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: rca-copilot-frontend
    ports:
      - "8501:8501"
    depends_on:
      - backend